# baram.nasun.io - Baram AI Compliance Settlement Layer

server {
    listen 443 ssl;
    server_name baram.nasun.io;

    # SSL (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/baram.nasun.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/baram.nasun.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/baram/dist;
    index index.html;

    # Basic Auth
    auth_basic "Restricted Access";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Let's Encrypt validation (no auth)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        auth_basic off;
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed assets - long cache
    location /assets/ {
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Static files - medium cache
    location ~* \.(png|jpg|svg|ico|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }
}

# HTTP -> HTTPS redirect
server {
    listen 80;
    server_name baram.nasun.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    return 301 https://$host$request_uri;
}
