# =============================================================================
# pado.finance - Production nginx configuration
# =============================================================================
# Serves both direct HTTPS (port 443) and CloudFront origin pull (port 80).
# CloudFront connects to port 80 with X-CloudFront-Secret header.
# Direct browser access on port 80 is redirected to HTTPS.
# =============================================================================

# --- Port 443: Direct HTTPS access (also works during DNS propagation) ---
server {
    server_name pado.finance www.pado.finance;

    root /var/www/pado.finance;
    index index.html;

    # HTTP Basic Auth
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd-pado;

    location /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/certbot;
    }

    # Static file caching (assets)
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA root: index.html must never be cached so browsers always fetch
    # the latest HTML (which references content-hashed assets).
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Chat moved to nasun.io/chat (unified chat server). 410 signals permanent
    # removal so browsers/SW/CDN invalidate stale cached responses (vs 502 retry loop).
    location /chat/ {
        add_header Link "<https://nasun.io/chat>; rel=\"canonical\"" always;
        return 410;
    }

    # WebSocket moved to wss://nasun.io/ws/chat. 410 terminates stale clients.
    location /ws {
        return 410;
    }

    # TP/SL Keeper Bot API proxy
    location /api/tpsl/ {
        include /etc/nginx/snippets/security-headers.conf;
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # RPC caching proxy (merged from nginx-rpc-proxy.conf)
    # Requires http-level directives from nginx-rpc-cache.conf
    location /rpc {
        include /etc/nginx/snippets/security-headers.conf;

        include /etc/nginx/snippets/datacenter-bot-farm-deny.conf;

        proxy_request_buffering on;
        client_max_body_size 1m;
        client_body_buffer_size 64k;

        proxy_pass https://rpc.devnet.nasun.io/;
        proxy_ssl_server_name on;

        proxy_set_header Host rpc.devnet.nasun.io;
        proxy_set_header Content-Type application/json;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_cache rpc_cache;
        proxy_cache_key $rpc_cache_key;
        # 5s TTL: SuiClient typical poll cadence is 3-5s. With 2s, ~60% of
        # cached entries served EXPIRED (revalidating against fullnode).
        # 5s aligns cache lifetime to client cadence; UX impact is bounded
        # by the client poll interval anyway.
        proxy_cache_valid 200 5s;
        proxy_cache_valid any 0;
        proxy_cache_use_stale updating error timeout;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_methods POST;

        add_header X-Cache-Status $upstream_cache_status always;

        # CORS headers (origin allowlist via map in nginx-rpc-cache.conf)
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Vary "Origin" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Vary "Origin" always;
            add_header Content-Length 0 always;
            return 204;
        }

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/pado.finance/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/pado.finance/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# --- Port 80: CloudFront origin pull + HTTPS redirect ---
# CloudFront connects here with X-CloudFront-Secret header.
# Direct browser access is redirected to HTTPS.
# Certbot ACME challenges are always allowed through.
server {
    listen 80;
    server_name pado.finance www.pado.finance;

    # Gate: allow CloudFront (secret header) and ACME challenges through.
    # Everything else gets redirected to HTTPS.
    # Using set+if pattern (safe per nginx docs for variable+return).
    set $cf_reject 1;

    if ($http_x_cloudfront_secret = "__CF_ORIGIN_SECRET_PADO__") {
        set $cf_reject 0;
    }

    # Allow certbot HTTP-01 ACME challenges without CF secret
    if ($uri ~ ^/.well-known/acme-challenge/) {
        set $cf_reject 0;
    }

    if ($cf_reject = 1) {
        return 301 https://$host$request_uri;
    }

    root /var/www/pado.finance;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Static file caching (assets)
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # SPA root: index.html must never be cached so browsers always fetch
    # the latest HTML (which references content-hashed assets).
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Chat moved to nasun.io/chat (unified chat server). 410 signals permanent
    # removal so browsers/SW/CDN invalidate stale cached responses (vs 502 retry loop).
    location /chat/ {
        add_header Link "<https://nasun.io/chat>; rel=\"canonical\"" always;
        return 410;
    }

    # WebSocket moved to wss://nasun.io/ws/chat. 410 terminates stale clients.
    location /ws {
        return 410;
    }

    # TP/SL Keeper Bot API proxy
    location /api/tpsl/ {
        include /etc/nginx/snippets/security-headers.conf;
        proxy_pass http://127.0.0.1:4001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    # RPC caching proxy (same as port 443)
    location /rpc {
        include /etc/nginx/snippets/security-headers.conf;

        include /etc/nginx/snippets/datacenter-bot-farm-deny.conf;

        proxy_request_buffering on;
        client_max_body_size 1m;
        client_body_buffer_size 64k;

        proxy_pass https://rpc.devnet.nasun.io/;
        proxy_ssl_server_name on;

        proxy_set_header Host rpc.devnet.nasun.io;
        proxy_set_header Content-Type application/json;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_cache rpc_cache;
        proxy_cache_key $rpc_cache_key;
        proxy_cache_valid 200 5s;
        proxy_cache_valid any 0;
        proxy_cache_use_stale updating error timeout;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;
        proxy_cache_methods POST;

        add_header X-Cache-Status $upstream_cache_status always;

        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Vary "Origin" always;

        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Vary "Origin" always;
            add_header Content-Length 0 always;
            return 204;
        }

        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
