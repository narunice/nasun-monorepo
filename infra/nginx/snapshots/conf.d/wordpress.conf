# WordPress CMS (cms.moonoak.io) - Headless CMS for nasun-website
server {
    server_name cms.moonoak.io;

    # Let's Encrypt cert verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    root /var/www/wordpress;
    index index.php;

    # WordPress permalinks
    location / {
        try_files $uri $uri/ /index.php?$args;
    }

    # PHP processing
    location ~ \.php$ {
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php-fpm/www.sock;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_pass_header Authorization;
    }

    # REST API - open access for headless CMS
    location ^~ /wp-json/ {
        # CORS for Preflight
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization' always;
            add_header 'Access-Control-Max-Age' 1728000;
            add_header 'Content-Type' 'text/plain; charset=utf-8';
            add_header 'Content-Length' 0;
            return 204;
        }
        try_files $uri $uri/ /index.php?$args;
    }

    # Block hidden files
    location ~ /\.ht {
        deny all;
    }

    # Security headers
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/cms.moonoak.io/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/cms.moonoak.io/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot

}

server {
    if ($host = cms.moonoak.io) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    listen 80;
    server_name cms.moonoak.io;
    return 404; # managed by Certbot


}