# explorer.nasun.io - Network Explorer

# HTTP - Serve content for CloudFront origin (CloudFront enforces HTTPS for viewers)
server {
    listen 80;
    server_name explorer.nasun.io;

    location /.well-known/acme-challenge/ {
        root /var/www/explorer.nasun.io;
        allow all;
    }

    root /var/www/explorer.nasun.io;
    index index.html;

    # Explorer API reverse proxy (to node-2 indexer API)
    location /api/v1/ {
        include /etc/nginx/snippets/datacenter-bot-farm-deny.conf;
        add_header Cache-Control "no-store" always;
        proxy_pass http://54.180.61.196:3200/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        client_max_body_size 10m;
        proxy_send_timeout 10s;

        # Rate limiting: 60 req/min per IP
        limit_req zone=explorer_api burst=30 nodelay;
    }

    # /devnet path handling (SPA)
    location /devnet {
        alias /var/www/explorer.nasun.io/devnet;
        try_files $uri $uri/ /devnet/index.html;

        # HTML - always revalidate
        location ~* \.html$ {
            add_header Cache-Control "no-cache";
        }

        # Hashed assets - immutable long-term cache
        location /devnet/assets/ {
            alias /var/www/explorer.nasun.io/devnet/assets/;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # Root redirect to /devnet
    location = / {
        return 302 /devnet;
    }
}

# HTTPS
server {
    listen 443 ssl;
    server_name explorer.nasun.io;

    ssl_certificate /etc/letsencrypt/live/explorer.nasun.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/explorer.nasun.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/explorer.nasun.io;
    index index.html;

    # Security headers (CSP, X-Frame-Options, etc.)
    include /etc/nginx/snippets/explorer-security-headers.conf;

    # Explorer API reverse proxy (to node-2 indexer API)
    location /api/v1/ {
        include /etc/nginx/snippets/datacenter-bot-farm-deny.conf;
        add_header Cache-Control "no-store" always;
        proxy_pass http://54.180.61.196:3200/api/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 5s;
        proxy_read_timeout 300s;
        client_max_body_size 10m;
        proxy_send_timeout 10s;

        # Rate limiting: 60 req/min per IP
        limit_req zone=explorer_api burst=30 nodelay;
    }

    # /devnet path handling (SPA)
    location /devnet {
        alias /var/www/explorer.nasun.io/devnet;
        try_files $uri $uri/ /devnet/index.html;

        # HTML - always revalidate (ensures new deploys are picked up immediately)
        location ~* \.html$ {
            include /etc/nginx/snippets/explorer-security-headers.conf;
            add_header Cache-Control "no-cache";
        }

        # Hashed assets - immutable long-term cache
        location /devnet/assets/ {
            alias /var/www/explorer.nasun.io/devnet/assets/;
            include /etc/nginx/snippets/explorer-security-headers.conf;
            add_header Cache-Control "public, max-age=31536000, immutable";
        }
    }

    # Root redirect to /devnet
    location = / {
        return 302 /devnet;
    }
}
