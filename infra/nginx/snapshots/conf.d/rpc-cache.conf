# =============================================================================
# Nginx RPC Cache - http-level directives for Pado RPC proxy
# =============================================================================
# Deploy to: /etc/nginx/conf.d/rpc-cache.conf
# These directives must be at the http level (outside server blocks).
# The actual location /rpc block is in nginx-production.conf server blocks.
# =============================================================================

# Cache zone: 10MB metadata (keys_zone), 100MB disk, inactive entries purged after 60s
proxy_cache_path /var/cache/nginx/rpc
    levels=1:2
    keys_zone=rpc_cache:10m
    max_size=100m
    inactive=60s
    use_temp_path=off;

# Map to extract JSON-RPC method from request body for logging/debugging
map $request_body $jsonrpc_method {
    default                          "unknown";
    ~"method"\s*:\s*"([^"]+)"        $1;
}

# Cache key normalization: strip the JSON-RPC `id` field so SuiClient's
# auto-incrementing id (1, 2, 3, …) does not bust the cache for identical
# method+params calls. Without this, hit ratio is effectively 0% (verified
# 2026-05-08: same body → HIT, body differing only by id → MISS).
# Greedy `(.*)` + `:[0-9]+` only matches a bare-integer id, so string ids
# inside params (e.g. Sui object IDs "0x...") are unaffected.
map $request_body $rpc_cache_key {
    default                                       $request_body;
    ~^(?<a>.*)"id"\s*:\s*[0-9]+(?<b>.*)$          "${a}${b}";
}

# CORS origin allowlist: only reflect matching origins
map $http_origin $cors_origin {
    default                          "";
    "https://pado.finance"           $http_origin;
    "https://staging.pado.finance"   $http_origin;
    "http://localhost:5176"          $http_origin;
}

map $http_origin $chat_cors_origin {
    default                              "";
    "https://nasun.io"                 $http_origin;
    "https://staging.nasun.io"         $http_origin;
    "http://localhost:5174"            $http_origin;
}
