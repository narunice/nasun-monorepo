# nasun.io - Production Website

# HTTP - CloudFront origin + HTTPS redirect for direct visitors
server {
    listen 80;
    # Disable gzip for CloudFront origin - let CloudFront handle compression (gzip + Brotli)
    gzip off;
    server_name nasun.io www.nasun.io 43.200.67.52 ec2-43-200-67-52.ap-northeast-2.compute.amazonaws.com;

    # Rate limiting
    limit_req zone=general burst=50 nodelay;
    limit_conn addr 20;

    # Datacenter bot-farm deny list (shared across nasun apps)
    include /etc/nginx/snippets/datacenter-bot-farm-deny.conf;

    # Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        auth_basic off;
    }

    # Direct visitors -> HTTPS redirect (no CloudFront header)
    if ($http_x_cloudfront_secret != "__CF_ORIGIN_SECRET_NASUN__") {
        return 301 https://$host$request_uri;
    }

    # === CloudFront origin requests (HTTP, no auth) ===
    # auth_basic "Restricted Access";
    # auth_basic_user_file /etc/nginx/.htpasswd;
    root /var/www/nasun/dist;
    index index.html;

    location /locales/ {
        # add_header alone avoids the duplicate Cache-Control header that
        # `expires -1` would emit alongside it.
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /videos/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /images/posters/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /assets/ {
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    location ~* ^/(manifest\.json|sitemap\.xml|favicon\.ico|robots\.txt)$ {
        auth_basic off;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location = /index.html {
        # Prevent stale HTML after deployments.
        # add_header alone avoids the duplicate Cache-Control header that
        # `expires -1` would emit alongside it.
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # OG bot detection for Alliance NFT
    location = /wave1/alliance-nft {
        if ($http_user_agent ~* "(Twitterbot|facebookexternalhit|LinkedInBot|Slackbot|TelegramBot|Discordbot|WhatsApp)") {
            rewrite ^ /og/alliance-nft.html break;
        }
        try_files $uri /index.html;
    }

    # Internal cache invalidation webhook
    location /api/internal/cache/invalidate {
        proxy_pass http://127.0.0.1:3101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Baram (Plan D) - Telegram bot webhook + session/sessions API.
    # Path is forwarded as-is to chat-server (no trailing-slash strip).
    location /api/baram/ {
        proxy_pass http://127.0.0.1:3101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180;
    }

    # Nasun AI canonical alias for /api/baram/* (S5+ unified naming).
    # Same backend, mirrored so frontend can call the rebranded path while
    # the legacy /api/baram/* alias is still served during the cutover window.
    # CloudFront has a matching cache behavior at PathPattern /api/nasun-ai/*.
    location /api/nasun-ai/ {
        proxy_pass http://127.0.0.1:3101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 180;
    }

    # WebSocket proxy for nasun-chat-server
    # HTTP API proxy for nasun-chat-server (leaderboard, feed, competitions)
    #
    # CORS is handled entirely by the chat-server process (see
    # apps/nasun-website/chat-server/src/server.ts ~L387). Adding `add_header
    # Access-Control-*` here would duplicate the headers for any origin that
    # nginx's $chat_cors_origin map and the chat-server allowlist both match
    # (nasun.io, staging.nasun.io), and the browser rejects responses whose
    # Access-Control-Allow-Origin appears more than once - even when the
    # values are identical. The 2026-05-22 cost-basis CORS incident was that.
    location /chat/ {
        proxy_pass http://127.0.0.1:3101/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket proxy for nasun-chat-server
    location /ws/chat {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin https://nasun.io;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # version.json is polled by the SPA every 5 min to detect new deploys.
    # Must NOT be cached at any layer or the polling becomes a no-op.
    location = /version.json {
        add_header Cache-Control "no-store" always;
        add_header Access-Control-Allow-Origin "*" always;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Permissions-Policy "xr-spatial-tracking=()";
    }
}

# HTTPS - Main Server (direct visitors)
server {
    listen 443 ssl http2;
    server_name nasun.io www.nasun.io;

    # Rate limiting
    limit_req zone=general burst=50 nodelay;
    limit_conn addr 20;

    # Datacenter bot-farm deny list (shared across nasun apps)
    include /etc/nginx/snippets/datacenter-bot-farm-deny.conf;

    # SSL Configuration (managed by Certbot)
    ssl_certificate /etc/letsencrypt/live/nasun.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/nasun.io/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Document root
    root /var/www/nasun/dist;
    index index.html;

    # Basic Auth (런칭 시 제거 - 아래 2줄 삭제 또는 주석 처리)
