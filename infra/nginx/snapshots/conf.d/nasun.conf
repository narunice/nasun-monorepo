# nasun.io - Production Website

# HTTP - CloudFront origin + HTTPS redirect for direct visitors
server {
    listen 80;
    # Disable gzip for CloudFront origin - let CloudFront handle compression (gzip + Brotli)
    gzip off;
    server_name nasun.io www.nasun.io 43.200.67.52 ec2-43-200-67-52.ap-northeast-2.compute.amazonaws.com;

    # Rate limiting
    limit_req zone=general burst=50 nodelay;
    limit_conn addr 20;

    # Datacenter bot-farm deny list (shared across nasun apps)
    include /etc/nginx/snippets/datacenter-bot-farm-deny.conf;

    # Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
        auth_basic off;
    }

    # Direct visitors -> HTTPS redirect (no CloudFront header)
    if ($http_x_cloudfront_secret != "__CF_ORIGIN_SECRET_NASUN__") {
        return 301 https://$host$request_uri;
    }

    # === CloudFront origin requests (HTTP, no auth) ===
    # auth_basic "Restricted Access";
    # auth_basic_user_file /etc/nginx/.htpasswd;
    root /var/www/nasun/dist;
    index index.html;

    location /locales/ {
        expires -1;
        add_header Cache-Control "no-cache, must-revalidate";
    }

    location /videos/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /images/posters/ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /assets/ {
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
        add_header Access-Control-Allow-Origin "*";
        add_header Access-Control-Allow-Methods "GET, OPTIONS";
    }

    location ~* ^/(manifest\.json|sitemap\.xml|favicon\.ico|robots\.txt)$ {
        auth_basic off;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    location = /index.html {
        # Prevent stale HTML after deployments
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # OG bot detection for Alliance NFT
    location = /wave1/alliance-nft {
        if ($http_user_agent ~* "(Twitterbot|facebookexternalhit|LinkedInBot|Slackbot|TelegramBot|Discordbot|WhatsApp)") {
            rewrite ^ /og/alliance-nft.html break;
        }
        try_files $uri /index.html;
    }

    # Internal cache invalidation webhook
    location /api/internal/cache/invalidate {
        proxy_pass http://127.0.0.1:3101;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # WebSocket proxy for nasun-chat-server
    # HTTP API proxy for nasun-chat-server (leaderboard, feed, competitions)
    location /chat/ {
        proxy_pass http://127.0.0.1:3101/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        add_header Access-Control-Allow-Origin $chat_cors_origin always;
        add_header Access-Control-Allow-Methods "GET, POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
        add_header Vary "Origin" always;
    }

    # WebSocket proxy for nasun-chat-server
    location /ws/chat {
        proxy_pass http://127.0.0.1:3101;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Origin https://nasun.io;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    location / {
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
        add_header Permissions-Policy "xr-spatial-tracking=()";
    }
}

# HTTPS - Main Server (direct visitors)
server {
    listen 443 ssl http2;
    server_name nasun.io www.nasun.io;

    # Rate limiting
    limit_req zone=general burst=50 nodelay;
    limit_conn addr 20;

    # Datacenter bot-farm deny list (shared across nasun apps)
    include /etc/nginx/snippets/datacenter-bot-farm-deny.conf;

