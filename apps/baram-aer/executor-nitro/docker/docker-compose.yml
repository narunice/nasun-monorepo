# Docker Compose for local TEE simulation
#
# This simulates the Nitro Enclave architecture:
# - Enclave: Isolated container (simulating TEE)
# - Host: Proxy container (simulating EC2 host)
#
# In production AWS Nitro:
# - Enclave runs inside Nitro Enclave (no network access)
# - Host runs on EC2 instance
# - Communication via vsock (not TCP)

version: '3.8'

services:
  # Enclave container - simulates TEE
  # In production, this would be a Nitro Enclave image (EIF)
  enclave:
    build:
      context: ..
      dockerfile: docker/Dockerfile.enclave
    container_name: baram-enclave
    environment:
      # OpenAI API key (required)
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    # Expose port only to internal network
    # In production Nitro, enclave has NO network access
    expose:
      - "5050"
    networks:
      - baram-internal
    # Simulate isolation - no privileged access
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp

  # Host container - proxy to external world
  host:
    build:
      context: ..
      dockerfile: docker/Dockerfile.host
    container_name: baram-host
    environment:
      - ENCLAVE_HOST=enclave
      - ENCLAVE_PORT=5050
      - HOST_PORT=3000
    ports:
      # Expose HTTP API to external world
      - "3000:3000"
    depends_on:
      - enclave
    networks:
      - baram-internal
      - baram-external

networks:
  # Internal network - Host ↔ Enclave communication only
  baram-internal:
    internal: true
  # External network - Host ↔ External world
  baram-external:
