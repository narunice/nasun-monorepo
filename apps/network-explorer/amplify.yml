version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        # Clear Vite cache and old build artifacts to ensure fresh build
        - rm -rf node_modules/.vite dist
        - pnpm install --frozen-lockfile
    build:
      commands:
        - pnpm build
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      # Only cache pnpm store, not Vite cache
      - node_modules/.pnpm/**/*
