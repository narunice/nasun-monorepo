version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        # Install only network-explorer and its workspace dependencies to reduce memory usage
        # The "..." suffix includes transitive workspace deps (@nasun/wallet, @nasun/wallet-ui, etc.)
        - pnpm install --filter @nasun/network-explorer...
    build:
      commands:
        # Build from monorepo root with filter
        - pnpm --filter @nasun/network-explorer build
  artifacts:
    baseDirectory: apps/network-explorer/dist
    files:
      - '**/*'
  cache:
    paths:
      # Only cache pnpm store for faster installs
      - node_modules/.pnpm/**/*
