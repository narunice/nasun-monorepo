version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        # 모노레포 루트로 이동하여 전체 의존성 설치
        - cd ../.. && pnpm install
    build:
      commands:
        # 모노레포 루트에서 network-explorer만 빌드
        - cd ../.. && pnpm build:network-explorer
  artifacts:
    baseDirectory: dist
    files:
      - '**/*'
  cache:
    paths:
      - ../../node_modules/**/*
      - node_modules/**/*
