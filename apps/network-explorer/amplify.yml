version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install -g pnpm
        - pnpm install
    build:
      commands:
        - pnpm build:network-explorer
  artifacts:
    baseDirectory: apps/network-explorer/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - apps/*/node_modules/**/*
      - packages/*/node_modules/**/*
