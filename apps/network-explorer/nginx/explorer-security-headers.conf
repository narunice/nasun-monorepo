# Security headers for explorer.nasun.io
# Content Security Policy (migrated from <meta> tag for stronger enforcement)
# img-src/media-src allow https: because NFT images/videos can be hosted on any domain
add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' https: data:; media-src 'self' https: data:; font-src 'self'; connect-src 'self' https://rpc.devnet.nasun.io https://faucet.devnet.nasun.io https://*.execute-api.ap-northeast-2.amazonaws.com https://accounts.google.com https://www.googleapis.com https://*.walletconnect.com wss://*.walletconnect.com wss://*.walletconnect.org; frame-src 'none'; frame-ancestors 'none'; object-src 'none';" always;

# Clickjacking protection (redundant with frame-ancestors but needed for older browsers)
add_header X-Frame-Options "DENY" always;

# MIME-type sniffing prevention
add_header X-Content-Type-Options "nosniff" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy (restrict browser features)
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
