server {
    server_name staging.pado.finance;

    root /var/www/staging.pado.finance;
    index index.html;

    # HTTP Basic Auth
    auth_basic "Restricted";
    auth_basic_user_file /etc/nginx/.htpasswd-pado;

    # Static file caching (assets)
    location /assets/ {
        include /etc/nginx/snippets/security-headers.conf;
        expires max;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Root location with short cache for index.html
    location / {
        include /etc/nginx/snippets/security-headers.conf;
        try_files $uri $uri/ /index.html;
        expires 1h;
        add_header Cache-Control "public, must-revalidate";
    }

    # WebSocket proxy for chat server
    location /ws {
        include /etc/nginx/snippets/security-headers.conf;
        proxy_pass http://127.0.0.1:3100;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # HTTP API proxy for chat server
    location /chat/ {
        include /etc/nginx/snippets/security-headers.conf;
        proxy_pass http://127.0.0.1:3100/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Let's Encrypt (no auth required)
    location /.well-known/acme-challenge/ {
        auth_basic off;
        root /var/www/staging.pado.finance;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/staging.pado.finance/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/staging.pado.finance/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = staging.pado.finance) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name staging.pado.finance;
    return 404; # managed by Certbot
}
