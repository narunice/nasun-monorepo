# =============================================================================
# Nginx RPC Caching Proxy for Pado
# =============================================================================
# Purpose: Cache Sui JSON-RPC read responses to reduce load on the RPC node.
#          With 300 concurrent users polling the same orderbook/prices, the RPC
#          node only gets hit once per cache TTL (2s) instead of 300x.
#
# Setup:
#   1. Copy this file to /etc/nginx/conf.d/rpc-proxy.conf on the EC2 server
#   2. Create cache directory: sudo mkdir -p /var/cache/nginx/rpc
#   3. Set ownership: sudo chown nginx:nginx /var/cache/nginx/rpc
#   4. Test config: sudo nginx -t
#   5. Reload: sudo systemctl reload nginx
#
# Cache key: POST request body hash (Sui JSON-RPC uses POST for all methods)
# Cache TTL: 2 seconds (configurable via $rpc_cache_ttl)
# Write methods (sui_executeTransactionBlock etc.) naturally miss cache
# because their request body contains unique transaction bytes.
# =============================================================================

# Cache zone: 10MB metadata (keys_zone), 100MB disk, inactive entries purged after 60s
proxy_cache_path /var/cache/nginx/rpc
    levels=1:2
    keys_zone=rpc_cache:10m
    max_size=100m
    inactive=60s
    use_temp_path=off;

# Map to extract JSON-RPC method from request body for logging/debugging
# This runs on the buffered request body after proxy_pass
map $request_body $jsonrpc_method {
    default                          "unknown";
    ~"method"\s*:\s*"([^"]+)"        $1;
}

# CORS origin allowlist: only reflect matching origins
map $http_origin $cors_origin {
    default                          "";
    "https://pado.finance"           $http_origin;
    "https://staging.pado.finance"   $http_origin;
    "http://localhost:5176"          $http_origin;
}

server {
    # This block should be included in the existing server block for pado.finance
    # or staging.pado.finance. Only the location /rpc block needs to be added.

    # --- Add this location block to the existing server config ---

    location /rpc {
        include /etc/nginx/snippets/security-headers.conf;

        # Buffer the request body so nginx can hash it for caching
        proxy_request_buffering on;
        client_max_body_size 1m;
        client_body_buffer_size 64k;

        # Upstream RPC node
        proxy_pass https://rpc.devnet.nasun.io/;
        proxy_ssl_server_name on;

        # Forward headers
        proxy_set_header Host rpc.devnet.nasun.io;
        proxy_set_header Content-Type application/json;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Cache configuration
        proxy_cache rpc_cache;

        # Cache key = hash of POST body (same RPC call from different users = same key)
        proxy_cache_key $request_body;

        # Cache TTL: 2 seconds for all responses
        # Write methods (executeTransactionBlock, dryRunTransactionBlock with unique tx)
        # naturally miss cache because their body is unique each time
        proxy_cache_valid 200 2s;
        proxy_cache_valid any 0;

        # Allow serving stale responses while revalidating (prevents thundering herd)
        proxy_cache_use_stale updating error timeout;
        proxy_cache_lock on;
        proxy_cache_lock_timeout 5s;

        # Only cache POST requests (all Sui JSON-RPC is POST)
        proxy_cache_methods POST;

        # Cache status header for debugging (HIT/MISS/EXPIRED/STALE)
        add_header X-Cache-Status $upstream_cache_status always;

        # CORS headers (multi-origin via map block)
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Content-Type" always;
        add_header Access-Control-Max-Age 86400 always;
        add_header Vary "Origin" always;

        # Handle CORS preflight
        # add_header must be repeated inside if block (nginx return does not
        # inherit add_header from the enclosing location context)
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Methods "POST, OPTIONS" always;
            add_header Access-Control-Allow-Headers "Content-Type" always;
            add_header Access-Control-Max-Age 86400 always;
            add_header Vary "Origin" always;
            add_header Content-Length 0 always;
            return 204;
        }

        # Timeouts
        proxy_connect_timeout 5s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }
}
