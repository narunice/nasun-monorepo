<!-- index.html -->

<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#000000" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Preconnect to critical origins for faster first requests -->
    <link rel="preconnect" href="https://signin.auth.ap-northeast-2.amazoncognito.com" crossorigin />
    <link rel="dns-prefetch" href="https://rpc.devnet.nasun.io" />
    <link rel="dns-prefetch" href="https://accounts.google.com" />

    <!-- Hero poster preload is handled per-page to avoid wasting bandwidth on non-home routes -->

    <!-- Preload critical fonts to avoid FOUT -->
    <link rel="preload" as="font" href="/fonts/rubik/Rubik-Regular.woff2" type="font/woff2" crossorigin />
    <link rel="preload" as="font" href="/fonts/rubik/Rubik-Medium.woff2" type="font/woff2" crossorigin />
    <link rel="preload" as="font" href="/fonts/changeling-neo/ChangellingNeo-Bold.woff2" type="font/woff2" crossorigin />

    <!-- CSP (Content Security Policy) - vite.config.ts에서 자동 주입됨 (inject.tags 사용) -->

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- SEO -->
    <meta name="description" content="Nasun — A new Layer 1 blockchain with a DEX, AI platform, gaming, and more. All live on devnet." />
    <link rel="canonical" href="https://nasun.io" />
    <link rel="alternate" hreflang="en" href="https://nasun.io" />
    <link rel="alternate" hreflang="x-default" href="https://nasun.io" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Nasun" />
    <meta property="og:title" content="Nasun — Layer 1 Blockchain" />
    <meta property="og:description" content="A new Layer 1 blockchain with a DEX, AI platform, gaming, and more. All live on devnet." />
    <meta property="og:image" content="https://nasun.io/Nasun-OG.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:url" content="https://nasun.io" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Nasun_io" />
    <meta name="twitter:creator" content="@Nasun_io" />
    <meta name="twitter:title" content="Nasun — Layer 1 Blockchain" />
    <meta name="twitter:description" content="A new Layer 1 blockchain with a DEX, AI platform, gaming, and more. All live on devnet." />
    <meta name="twitter:image" content="https://nasun.io/Nasun-OG.png" />

    <title>Nasun</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
